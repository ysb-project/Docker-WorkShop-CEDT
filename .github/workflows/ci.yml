name: CI

# TODO(step-6a): trigger the workflow on push targeting the `main` branch.
on:
  push:
    branches: [ "main" ]

env:
  IMAGE_NAME: workshop-app

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # TODO(step-6b): build the image locally with tag $IMAGE_NAME:${{ github.sha }}.
      - name: Build image
        run: |
          docker build -t $IMAGE_NAME:${{ github.sha }} .

      # scan the freshly built image with Trivy. Fail the job on CRITICAL.
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master# อัปเกรดเวอร์ชันให้เสถียรขึ้น
        with:
            scan-type: 'image'
            image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
            severity: 'CRITICAL'
            exit-code: '1'
            ignore-unfixed: true

      # log in to Docker Hub using DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # TODO(step-6e): tag and push the image as both :latest and :${{ github.sha }}.
      - name: Tag and push
        run: |
          FULL=${{ secrets.DOCKERHUB_USERNAME }}/$IMAGE_NAME
          docker tag $IMAGE_NAME:${{ github.sha }} $FULL:${{ github.sha }}
          docker tag $IMAGE_NAME:${{ github.sha }} $FULL:latest
          docker push $FULL:${{ github.sha }}
          docker push $FULL:latest